<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure P2P Chat (Max 10)</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --chat-bg: #ffffff;
            --text-color: #111b21;
            --msg-bg: #ffffff;
            --msg-text: #111b21;
            --my-msg-bg: #d9fdd3;
            --system-text: #667781;
            --input-bg: #ffffff;
            --border-color: #e9edef;
            --btn-bg: #00a884;
            --btn-text: #ffffff;
        }

        body.dark-mode {
            --bg-color: #111b21;
            --chat-bg: #222e35;
            --text-color: #e9edef;
            --msg-bg: #202c33;
            --msg-text: #e9edef;
            --my-msg-bg: #005c4b;
            --system-text: #8696a0;
            --input-bg: #2a3942;
            --border-color: #2a3942;
            --btn-bg: #00a884;
            --btn-text: #111b21;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; height: 100vh; transition: background 0.3s, color 0.3s; }
        
        #darkModeToggle { position: fixed; top: 15px; right: 15px; background: var(--chat-bg); border: 1px solid var(--border-color); border-radius: 50%; width: 40px; height: 40px; font-size: 18px; cursor: pointer; z-index: 100; color: var(--text-color); }

        #setup-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .setup-card { background: var(--chat-bg); padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 400px; }
        .setup-card h1 { margin-bottom: 10px; font-size: 24px; }
        .setup-card p { margin-bottom: 20px; color: var(--system-text); font-size: 14px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 14px; color: var(--system-text); }
        .input-group input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color); font-size: 16px; }
        .btn { width: 100%; padding: 14px; border-radius: 8px; border: none; background: var(--btn-bg); color: var(--btn-text); font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }

        #chat-screen { display: none; flex-direction: column; height: 100vh; }
        .chat-header { background: var(--chat-bg); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .room-info { font-weight: bold; }
        .status { font-size: 12px; color: var(--system-text); }
        .leave-btn { background: #ff4757; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        #chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background-image: linear-gradient(var(--bg-color), var(--bg-color)); }
        
        .message { max-width: 70%; padding: 10px 15px; border-radius: 10px; font-size: 15px; position: relative; word-wrap: break-word; }
        .message.sent { align-self: flex-end; background: var(--my-msg-bg); color: var(--msg-text); border-top-right-radius: 0; }
        .message.received { align-self: flex-start; background: var(--msg-bg); color: var(--msg-text); border-top-left-radius: 0; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .sender-name { font-size: 12px; color: #00a884; margin-bottom: 4px; font-weight: bold; }
        .message img, .message video { max-width: 100%; border-radius: 8px; margin-top: 5px; }
        .message a { color: #027eb5; text-decoration: underline; }

        .system-msg { align-self: center; background: transparent; color: var(--system-text); font-size: 12px; padding: 5px 12px; border-radius: 10px; margin: 5px 0; text-align: center; }

        .chat-input-area { background: var(--chat-bg); padding: 15px; display: flex; align-items: center; gap: 10px; border-top: 1px solid var(--border-color); }
        #fileInput { display: none; }
        .attach-btn { background: transparent; border: none; font-size: 24px; cursor: pointer; color: var(--system-text); }
        #messageInput { flex: 1; padding: 12px 15px; border-radius: 20px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color); font-size: 15px; outline: none; }
        .send-btn { background: var(--btn-bg); color: var(--btn-text); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <button id="darkModeToggle" onclick="toggleDarkMode()">🌙</button>

    <!-- Setup Screen -->
    <div id="setup-screen">
        <div class="setup-card">
            <h1>🔒 P2P Encrypted Chat</h1>
            <p>WebRTC Peer-to-Peer Connection (Max 10 Users)</p>
            
            <div class="input-group">
                <label>Your Name</label>
                <input type="text" id="usernameInput" placeholder="Enter your name" maxlength="20">
            </div>
            
            <div class="input-group">
                <label>Room ID</label>
                <input type="text" id="roomInput" placeholder="e.g., Room123">
            </div>
            
            <button class="btn" id="joinBtn" onclick="joinRoom()">Create / Join Room</button>
            <p id="errorMsg" style="color: #ff4757; margin-top: 10px; font-size: 14px; display: none;">Please enter both fields.</p>
        </div>
    </div>

    <!-- Chat Screen -->
    <div id="chat-screen">
        <div class="chat-header">
            <div>
                <div class="room-info">Room: <span id="roomIdDisplay"></span></div>
                <div class="status" id="statusText">Connecting...</div>
            </div>
            <button class="leave-btn" onclick="leaveRoom()">Leave</button>
        </div>

        <div id="chat-messages"></div>

        <div class="chat-input-area">
            <input type="file" id="fileInput">
            <button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>
            <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        let peer;
        let conns = {}; // Host: stores connections to clients
        let hostConn; // Client: stores connection to host
        let isHost = false;
        let currentUsername = '';
        let currentRoomId = '';
        const MAX_PEERS = 9; // 9 clients + 1 host = 10 total

        // Check dark mode preference
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
            document.getElementById('darkModeToggle').textContent = '☀️';
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDark);
            document.getElementById('darkModeToggle').textContent = isDark ? '☀️' : '🌙';
        }

        function joinRoom() {
            const username = document.getElementById('usernameInput').value.trim();
            const roomId = document.getElementById('roomInput').value.trim();
            const errorEl = document.getElementById('errorMsg');

            if (!username || !roomId) {
                errorEl.style.display = 'block';
                return;
            }

            errorEl.style.display = 'none';
            currentUsername = username;
            currentRoomId = roomId;

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('roomIdDisplay').textContent = roomId;

            // Try to connect as a client first
            const tempPeer = new Peer();
            
            tempPeer.on('open', () => {
                const conn = tempPeer.connect(`${roomId}-host`, { reliable: true });
                
                conn.on('open', () => {
                    isHost = false;
                    hostConn = conn;
                    document.getElementById('statusText').textContent = 'Connected as Client';
                    // Send join notification
                    hostConn.send({ type: 'system', action: 'join', username: currentUsername });
                    appendSystemMsg("You joined the room");
                });

                conn.on('data', (data) => {
                    handleData(data);
                });

                conn.on('close', () => {
                    appendSystemMsg("Host disconnected. Room closed.");
                    document.getElementById('statusText').textContent = 'Disconnected';
                });

                // If connection fails (host doesn't exist), become the host
                setTimeout(() => {
                    if (!hostConn) {
                        becomeHost(tempPeer);
                    }
                }, 2000);
            });

            tempPeer.on('error', (err) => {
                console.error("Temp peer error:", err);
                becomeHost(tempPeer);
            });
        }

        function becomeHost(tempPeer) {
            tempPeer.destroy(); // Close temp peer
            isHost = true;
            peer = new Peer(`${currentRoomId}-host`);
            
            peer.on('open', () => {
                document.getElementById('statusText').textContent = 'Connected as Host';
                appendSystemMsg("You created the room");
            });

            peer.on('connection', (conn) => {
                if (Object.keys(conns).length >= MAX_PEERS) {
                    // Room is full
                    conn.on('open', () => {
                        conn.send({ type: 'system', action: 'full' });
                        setTimeout(() => conn.close(), 500);
                    });
                    return;
                }

                conn.on('open', () => {
                    conns[conn.peer] = conn;
                });

                conn.on('data', (data) => {
                    if (data.type === 'system' && data.action === 'join') {
                        // Notify everyone else that this user joined
                        broadcast({ type: 'system', action: 'joined', msg: `${data.username} joined the room` }, conn.peer);
                        appendSystemMsg(`${data.username} joined the room`);
                        // Store username on the conn object for leave notifications
                        conn.metadata = { username: data.username };
                    } else {
                        // Relay messages to other clients
                        broadcast(data, conn.peer);
                        handleData(data);
                    }
                });

                conn.on('close', () => {
                    const username = conn.metadata ? conn.metadata.username : 'A user';
                    appendSystemMsg(`${username} left the room`);
                    broadcast({ type: 'system', action: 'left', msg: `${username} left the room` }, conn.peer);
                    delete conns[conn.peer];
                });
            });
        }

        // Host broadcasts data to all clients except the sender
        function broadcast(data, excludePeerId = null) {
            for (let id in conns) {
                if (id !== excludePeerId && conns[id].open) {
                    conns[id].send(data);
                }
            }
        }

        function handleData(data) {
            if (data.type === 'system') {
                if (data.action === 'full') {
                    alert("Room is full (Max 10 people).");
                    leaveRoom();
                } else if (data.action === 'joined' || data.action === 'left') {
                    appendSystemMsg(data.msg);
                }
            } else if (data.type === 'text') {
                appendMessage(data.username, data.msg, false);
            } else if (data.type === 'file') {
                appendFile(data.username, data.fileName, data.fileType, data.fileData, false);
            }
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const msg = input.value.trim();
            if (!msg) return;

            const data = { type: 'text', username: currentUsername, msg: msg };
            
            if (isHost) {
                broadcast(data);
            } else if (hostConn && hostConn.open) {
                hostConn.send(data);
            }

            appendMessage(currentUsername, msg, true);
            input.value = '';
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // 15MB limit for stability
            if (file.size > 15 * 1024 * 1024) {
                alert("File too large. Max 15MB.");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = { 
                    type: 'file', 
                    username: currentUsername, 
                    fileName: file.name, 
                    fileType: file.type, 
                    fileData: e.target.result 
                };

                if (isHost) {
                    broadcast(data);
                } else if (hostConn && hostConn.open) {
                    hostConn.send(data);
                }

                appendFile(currentUsername, file.name, file.type, e.target.result, true);
            };
            reader.readAsDataURL(file);
            e.target.value = ''; // Clear input
        });

        function appendMessage(username, msg, isSent) {
            const div = document.createElement('div');
            div.className = `message ${isSent ? 'sent' : 'received'}`;
            div.innerHTML = `<div class="sender-name">${username}</div>${escapeHtml(msg)}`;
            document.getElementById('chat-messages').appendChild(div);
            scrollToBottom();
        }

        function appendFile(username, fileName, fileType, fileData, isSent) {
            const div = document.createElement('div');
            div.className = `message ${isSent ? 'sent' : 'received'}`;
            
            let content = `<div class="sender-name">${username}</div>`;
            if (fileType.startsWith('image/')) {
                content += `<img src="${fileData}" alt="${fileName}">`;
            } else if (fileType.startsWith('video/')) {
                content += `<video controls><source src="${fileData}" type="${fileType}"></video>`;
            } else {
                content += `<a href="${fileData}" download="${fileName}">📄 ${fileName}</a>`;
            }

            div.innerHTML = content;
            document.getElementById('chat-messages').appendChild(div);
            scrollToBottom();
        }

        function appendSystemMsg(msg) {
            const div = document.createElement('div');
            div.className = 'system-msg';
            div.innerText = msg;
            document.getElementById('chat-messages').appendChild(div);
            scrollToBottom();
        }

        function scrollToBottom() {
            const chat = document.getElementById('chat-messages');
            chat.scrollTop = chat.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function leaveRoom() {
            if (peer) peer.destroy();
            if (hostConn) hostConn.close();
            location.reload();
        }
    </script>
</body>
</html>
