<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tune In — Chat Rooms</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --text: #f0f0f0;
            --accent: #ff0055;
            --input-bg: #1f1f1f;
            --border: #333;
        }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .hidden { display: none !important; }
        
        /* Setup View */
        #setupView {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .brand {
            font-size: 3rem;
            font-weight: bold;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }
        .brand span { color: var(--accent); }
        .tagline { color: #888; margin-bottom: 40px; }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border);
            width: 320px;
        }
        .tab-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 1.2rem;
            padding: 10px 20px;
            cursor: pointer;
            flex: 1;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }
        .tab-btn.active {
            color: var(--text);
            border-bottom: 2px solid var(--accent);
        }
        
        .form-container {
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #aaa; }
        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            box-sizing: border-box;
            font-size: 1rem;
        }
        .form-group input:focus { outline: none; border-color: var(--accent); }
        
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            background: var(--accent);
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .hint { font-size: 0.8rem; color: #666; margin-top: 15px; }
        #errorMsg { color: var(--accent); font-size: 0.9rem; margin-top: 10px; min-height: 1.2em; }

        /* Chat View */
        #chatView {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
        }
        .room-info { display: flex; align-items: center; gap: 10px; }
        .live-dot {
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .room-name { font-weight: bold; font-size: 1.2rem; }
        .leave-btn {
            background: #2a2a2a;
            border: 1px solid var(--border);
            color: #ff5555;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .msg {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            background: var(--card);
            word-wrap: break-word;
            position: relative;
        }
        .msg-name { font-size: 0.8rem; color: var(--accent); margin-bottom: 4px; font-weight: bold; }
        .msg-text { font-size: 1rem; white-space: pre-wrap; }
        .msg-file { color: #00bfff; text-decoration: none; display: block; margin-top: 5px; }
        .msg-file img, .msg-file video { max-width: 100%; border-radius: 8px; margin-top: 5px; }
        
        .system-msg {
            text-align: center;
            color: #888;
            font-size: 0.85rem;
            background: #1a1a1a;
            padding: 5px 15px;
            border-radius: 20px;
            align-self: center;
        }

        .chat-input-area {
            padding: 15px 20px;
            background: var(--card);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .file-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #888;
        }
        #messageInput {
            flex: 1;
            padding: 12px 15px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            font-size: 1rem;
        }
        .send-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #fileInput { display: none; }
        .file-status { font-size: 0.8rem; color: #888; margin-right: 10px; }
    </style>
</head>
<body>

    <!-- Setup View -->
    <div id="setupView">
        <div class="brand">Tune <span>In</span></div>
        <div class="tagline">◉ ON AIR · Encrypted P2P Chat</div>

        <div class="tabs">
            <button class="tab-btn active" id="tabJoin" onclick="switchTab('join')">Join</button>
            <button class="tab-btn" id="tabCreate" onclick="switchTab('create')">Create</button>
        </div>

        <!-- Join Form -->
        <div class="form-container" id="joinForm">
            <div class="form-group">
                <label>Your name</label>
                <input type="text" id="nameInputJoin" placeholder="Anonymous">
            </div>
            <div class="form-group">
                <label>Room ID</label>
                <input type="text" id="roomIdInputJoin" placeholder="e.g. hello123">
            </div>
            <button class="btn" onclick="joinRoom()">Join Room</button>
            <div class="hint">No rooms yet on this browser — create one first or join an existing one.</div>
            <div id="errorMsg"></div>
        </div>

        <!-- Create Form -->
        <div class="form-container hidden" id="createForm">
            <div class="form-group">
                <label>Your name</label>
                <input type="text" id="nameInputCreate" placeholder="Anonymous">
            </div>
            <div class="form-group">
                <label>New room ID</label>
                <input type="text" id="roomIdInputCreate" placeholder="e.g. my-secret-room">
            </div>
            <button class="btn" onclick="createRoom()">Create Room</button>
            <div class="hint">Room IDs must be unique. Letters, numbers, dashes work best.</div>
            <div id="errorMsgCreate"></div>
        </div>
    </div>

    <!-- Chat View -->
    <div id="chatView" class="hidden">
        <div class="chat-header">
            <div class="room-info">
                <div class="live-dot"></div>
                <div class="room-name" id="roomNameDisplay">CH 00</div>
            </div>
            <button class="leave-btn" onclick="leaveRoom()">Leave</button>
        </div>

        <div id="messages">
            <div class="system-msg">Nothing here yet. Send the first message below.</div>
        </div>

        <div class="chat-input-area">
            <input type="file" id="fileInput" onchange="handleFileSelect(this)">
            <button class="file-btn" onclick="document.getElementById('fileInput').click()">📎</button>
            <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        let peer = null;
        let connections = {}; // Store peer connections
        let isHost = false;
        let roomId = null;
        let userName = "Anonymous";
        let currentFile = null;

        function switchTab(tab) {
            if (tab === 'join') {
                document.getElementById('joinForm').classList.remove('hidden');
                document.getElementById('createForm').classList.add('hidden');
                document.getElementById('tabJoin').classList.add('active');
                document.getElementById('tabCreate').classList.remove('active');
            } else {
                document.getElementById('joinForm').classList.add('hidden');
                document.getElementById('createForm').classList.remove('hidden');
                document.getElementById('tabJoin').classList.remove('active');
                document.getElementById('tabCreate').classList.add('active');
            }
        }

        function createRoom() {
            userName = document.getElementById('nameInputCreate').value || "Anonymous";
            roomId = document.getElementById('roomIdInputCreate').value.trim();
            if (!roomId) { document.getElementById('errorMsgCreate').innerText = "Please enter a Room ID."; return; }

            isHost = true;
            peer = new Peer(roomId);

            peer.on('open', () => {
                enterChatRoom();
            });

            peer.on('connection', (conn) => {
                handleNewConnection(conn);
            });

            peer.on('error', (err) => {
                document.getElementById('errorMsgCreate').innerText = "Error: " + err.type;
            });
        }

        function joinRoom() {
            userName = document.getElementById('nameInputJoin').value || "Anonymous";
            roomId = document.getElementById('roomIdInputJoin').value.trim();
            if (!roomId) { document.getElementById('errorMsg').innerText = "Please enter a Room ID."; return; }

            isHost = false;
            peer = new Peer(); // Generate random ID for client

            peer.on('open', () => {
                let conn = peer.connect(roomId, { reliable: true });
                
                conn.on('open', () => {
                    handleNewConnection(conn);
                    enterChatRoom();
                    // Announce join to host
                    conn.send({ type: 'system', text: `${userName} joined the room` });
                });

                conn.on('error', () => {
                    document.getElementById('errorMsg').innerText = "Could not connect. Room might not exist.";
                });
            });

            peer.on('error', (err) => {
                if (err.type === 'peer-unavailable') {
                    document.getElementById('errorMsg').innerText = "Room not found. Check the ID or create a new one.";
                } else {
                    document.getElementById('errorMsg').innerText = "Error: " + err.type;
                }
            });
        }

        function handleNewConnection(conn) {
            conn.on('data', (data) => {
                handleIncomingData(data, conn);
            });

            conn.on('close', () => {
                if (connections[conn.peer]) {
                    addSystemMessage(connections[conn.peer].name + " left the room");
                    delete connections[conn.peer];
                    // If host, notify others
                    if (isHost) broadcastData({ type: 'system', text: connections[conn.peer]?.name + " left" });
                }
            });

            connections[conn.peer] = { conn: conn, name: "Unknown User" };
        }

        function handleIncomingData(data, conn) {
            if (data.type === 'system') {
                addSystemMessage(data.text);
                if (connections[conn.peer]) connections[conn.peer].name = data.text.split(" ")[0]; // basic name capture
                // If host, relay to others
                if (isHost) broadcastData(data, conn.peer);
            } 
            else if (data.type === 'name') {
                if (connections[conn.peer]) connections[conn.peer].name = data.name;
                if (isHost) broadcastData(data, conn.peer); // relay name
            }
            else if (data.type === 'message' || data.type === 'file') {
                addMessageToUI(data.name, data.text, data.fileUrl, data.fileName, data.isImage, data.isVideo);
                if (isHost) broadcastData(data, conn.peer); // Relay to other clients
            }
        }

        function broadcastData(data, excludePeerId = null) {
            for (let id in connections) {
                if (id !== excludePeerId && connections[id].conn.open) {
                    connections[id].conn.send(data);
                }
            }
        }

        function enterChatRoom() {
            document.getElementById('setupView').classList.add('hidden');
            document.getElementById('chatView').classList.remove('hidden');
            document.getElementById('roomNameDisplay').innerText = roomId;
            addSystemMessage("You joined the room as " + userName);
            // Send name to host so they know who we are
            if (!isHost) {
                for (let id in connections) {
                    connections[id].conn.send({ type: 'name', name: userName });
                }
            }
        }

        function sendMessage() {
            let input = document.getElementById('messageInput');
            let text = input.value.trim();
            if (!text) return;

            let data = { type: 'message', name: userName, text: text };
            addMessageToUI(userName, text);
            
            // Send to all peers
            for (let id in connections) {
                if (connections[id].conn.open) connections[id].conn.send(data);
            }
            input.value = '';
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function handleFileSelect(input) {
            let file = input.files[0];
            if (!file) return;

            if (file.size > 15 * 1024 * 1024) {
                alert("File too large. Max 15MB.");
                input.value = '';
                return;
            }

            let reader = new FileReader();
            reader.onload = function(e) {
                let data = {
                    type: 'file',
                    name: userName,
                    fileName: file.name,
                    fileUrl: e.target.result,
                    isImage: file.type.startsWith('image/'),
                    isVideo: file.type.startsWith('video/')
                };
                
                addMessageToUI(userName, "", data.fileUrl, data.fileName, data.isImage, data.isVideo);
                
                for (let id in connections) {
                    if (connections[id].conn.open) connections[id].conn.send(data);
                }
            };
            reader.readAsDataURL(file);
            input.value = '';
        }

        function addMessageToUI(name, text, fileUrl = null, fileName = null, isImage = false, isVideo = false) {
            let messages = document.getElementById('messages');
            let msgDiv = document.createElement('div');
            msgDiv.className = 'msg';
            
            let nameDiv = document.createElement('div');
            nameDiv.className = 'msg-name';
            nameDiv.innerText = name;
            msgDiv.appendChild(nameDiv);

            if (text) {
                let textDiv = document.createElement('div');
                textDiv.className = 'msg-text';
                textDiv.innerText = text;
                msgDiv.appendChild(textDiv);
            }

            if (fileUrl) {
                let link = document.createElement('a');
                link.className = 'msg-file';
                link.href = fileUrl;
                link.download = fileName;
                link.innerText = "📄 " + fileName;
                
                if (isImage) {
                    let img = document.createElement('img');
                    img.src = fileUrl;
                    link.appendChild(img);
                } else if (isVideo) {
                    let video = document.createElement('video');
                    video.src = fileUrl;
                    video.controls = true;
                    link.appendChild(video);
                }
                msgDiv.appendChild(link);
            }

            messages.appendChild(msgDiv);
            messages.scrollTop = messages.scrollHeight;
        }

        function addSystemMessage(text) {
            let messages = document.getElementById('messages');
            let sysDiv = document.createElement('div');
            sysDiv.className = 'system-msg';
            sysDiv.innerText = text;
            messages.appendChild(sysDiv);
            messages.scrollTop = messages.scrollHeight;
        }

        function leaveRoom() {
            if (peer) {
                // Notify others
                for (let id in connections) {
                    if (connections[id].conn.open) {
                        connections[id].conn.send({ type: 'system', text: userName + " left the room" });
                        connections[id].conn.close();
                    }
                }
                peer.destroy();
                peer = null;
            }
            connections = {};
            document.getElementById('chatView').classList.add('hidden');
            document.getElementById('setupView').classList.remove('hidden');
            document.getElementById('messages').innerHTML = '<div class="system-msg">Nothing here yet. Send the first message below.</div>';
        }
    </script>
</body>
</html>
